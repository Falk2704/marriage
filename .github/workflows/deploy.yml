name: Deploy to OVHcloud FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build CSS
        run: npm run build
        working-directory: website

      - name: Stage deployable files
        run: |
          mkdir _deploy
          cp website/index.html _deploy/
          cp website/robots.txt _deploy/
          cp -r website/dist _deploy/
          cp -r website/images _deploy/
          cp -r website/assets _deploy/

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_USERNAME: ${{ vars.FTP_USERNAME }}
          FTP_HOST: ${{ vars.FTP_HOST }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_HOST" -e "
            set ftp:ssl-allow yes;
            mirror --reverse --delete --verbose _deploy/ /www/;
            bye"
